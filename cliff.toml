# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") -%}
{% for commit in commits -%}
{{ group | split(pat="-") | last }}: {{ commit.message | split(pat="\n") | first | trim }}
{% endfor -%}
{% endfor %}

"""
footer = ""
trim = true

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false

# Strip conventional-commit prefixes from the displayed message
# (the category prefix is re-added by the template via the parser group).
commit_preprocessors = [
  { pattern = '^(feat|fix|perf|docs?|build|ci|chore|refactor|test|api|cli|port|portability|misc|style)(\([^)]+\))?!?:\s*', replace = '' },
]

# Order matters: the first matching rule wins.
# Skip rules first, then specific categories, then a catch-all.
commit_parsers = [
  # ---- Skip noise ----
  { message = "^[Bb]ump (to )?v?[0-9]",                                                                              skip = true },
  { message = "^chore\\(release\\)",                                                                                  skip = true },
  { message = "^docs\\(changelog\\)",                                                                                 skip = true },
  { message = "(?i)\\.ds_store",                                                                                      skip = true },
  { message = "^[Mm]erge ",                                                                                           skip = true },

  # ---- Categories ----
  { message = "^feat",                                                                                                group = "01-api" },
  { message = "^api[:(]",                                                                                             group = "01-api" },
  { message = "(?i)\\bapi\\b",                                                                                        group = "01-api" },

  { message = "^fix",                                                                                                 group = "02-fix" },
  { message = "^[Ff]ix(es|ed)? ",                                                                                     group = "02-fix" },

  { message = "^perf",                                                                                                group = "03-perf" },
  { message = "^[Oo]ptimi[sz]e",                                                                                      group = "03-perf" },
  { message = "(?i)speed[- ]?up|faster|throughput",                                                                   group = "03-perf" },

  { message = "^cli[:(]",                                                                                             group = "04-cli" },
  { message = "(?i)\\bcli\\b",                                                                                        group = "04-cli" },

  { message = "^build",                                                                                               group = "05-build" },
  { message = "^ci[:(]",                                                                                              group = "05-build" },
  { message = "(?i)workflow|makefile|cmake|wrapper",                                                                  group = "05-build" },

  { message = "(?i)portability|android|windows|linux|macos|emscripten|wasm|freebsd|qnx",                              group = "06-portability" },

  { message = "^docs?",                                                                                               group = "07-doc" },
  { message = "(?i)readme|whitepaper|documentation|benchmark.*(graph|figure|chart)|refresh.*benchmark|update.*docs?", group = "07-doc" },

  # ---- Catch-all ----
  { message = ".*",                                                                                                   group = "08-misc" },
]
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
sort_commits = "newest"
