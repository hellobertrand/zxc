#==============================================================================
# SonarQube Cloud - Automatic Analysis scope (.sonarcloud.properties)
#==============================================================================
# Read by SonarQube Cloud's Automatic Analysis (the GitHub-app integration; no
# CI / SonarScanner). The project key & organization come from the repository
# binding configured in the SonarQube Cloud UI, so they are NOT set here.
#
# Analyses first-party shipped source (C library + CLI + public headers + the
# hand-written language wrappers) and excludes everything that must not raise
# findings. Note: Automatic Analysis does not compute coverage, so test files
# are excluded outright (no need to keep them analysed-but-muted), and issue-
# level ignores live in the UI (Analysis Scope) rather than this file.
#==============================================================================

sonar.sourceEncoding = UTF-8

# --- Sources (first-party, shipped) ------------------------------------------
# C library + CLI + public headers, and the hand-written wrapper bindings.
sonar.sources = src,include,wrappers

# --- Exclusions --------------------------------------------------------------
#   tests / conformance + wrapper tests : not shipped
#   docs / build                        : documentation and build output
#   src/lib/vendors                     : vendored third-party (rapidhash)
#   wrappers/wasm/zxc_wasm.js           : generated emscripten output
#   node_modules/target/.venv/...       : per-language dependency & build dirs
#                                         (installed third-party code)
sonar.exclusions = tests/**,conformance/**,wrappers/**/*_test.go,wrappers/**/test*/**,wrappers/wasm/test.mjs,docs/**,**/build/**,src/lib/vendors/**,wrappers/wasm/zxc_wasm.js,**/node_modules/**,**/target/**,**/.venv/**,**/venv/**,**/__pycache__/**,**/.pytest_cache/**,**/dist/**,**/prebuilds/**
