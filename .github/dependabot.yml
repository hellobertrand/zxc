version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
  - package-ecosystem: pip
    directory: /wrappers/python
    schedule:
      interval: monthly
  - package-ecosystem: cargo
    directory: /wrappers/rust
    schedule:
      interval: monthly
  - package-ecosystem: npm
    directory: /wrappers/nodejs
    schedule:
      interval: monthly
  - package-ecosystem: gomod
    directory: /wrappers/go
    schedule:
      interval: monthly