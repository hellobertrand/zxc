name: Code Security

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    strategy:
      fail-fast: false
      matrix:
        language: [ 'c-cpp', 'rust', 'python', 'go', 'javascript-typescript' ]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        config-file: ./.github/codeql/codeql-config.yml

    - name: Build Project
      run: |
        if [ "${{ matrix.language }}" = "c-cpp" ]; then
          make
        elif [ "${{ matrix.language }}" = "rust" ]; then
          cd wrappers/rust
          cargo build --workspace --all-targets
        elif [ "${{ matrix.language }}" = "python" ]; then
          cd wrappers/python
          python3 -m pip install -e .
        elif [ "${{ matrix.language }}" = "go" ]; then
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DZXC_BUILD_CLI=OFF -DZXC_BUILD_TESTS=OFF
          cmake --build build --parallel
          cd wrappers/go
          CGO_ENABLED=1 CGO_LDFLAGS="-L../../build -lzxc -lpthread" go build ./...
        elif [ "${{ matrix.language }}" = "javascript-typescript" ]; then
          cd wrappers/nodejs
          npm install
        fi

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{ matrix.language }}"
