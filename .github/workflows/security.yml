name: Code Security

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'c-cpp', 'rust', 'python', 'go', 'javascript-typescript' ]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Initialize CodeQL
      uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
      with:
        languages: ${{ matrix.language }}
        config-file: ./.github/codeql/codeql-config.yml

    - name: Build Project
      run: |
        if [ "${{ matrix.language }}" = "c-cpp" ]; then
          make
        elif [ "${{ matrix.language }}" = "rust" ]; then
          cd wrappers/rust
          cargo build --workspace --all-targets
        elif [ "${{ matrix.language }}" = "python" ]; then
          python3 -m pip install --require-hashes -r wrappers/python/requirements/build-deps.txt
          python3 -m pip install -e wrappers/python --no-build-isolation --no-deps
        elif [ "${{ matrix.language }}" = "go" ]; then
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DZXC_BUILD_CLI=OFF -DZXC_BUILD_TESTS=OFF
          cmake --build build --parallel
          cd wrappers/go
          CGO_ENABLED=1 CGO_LDFLAGS="-L../../build -lzxc -lpthread" go build ./...
        elif [ "${{ matrix.language }}" = "javascript-typescript" ]; then
          cd wrappers/nodejs
          npm ci
        fi

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
      with:
        category: "/language:${{ matrix.language }}"
