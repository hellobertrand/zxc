name: Benchmark

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - '.github/workflows/benchmark.yml'
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  lzbench-benchmark:
    name: Run Benchmark
    if: github.event.pull_request.draft == false
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-latest-xlarge]

    env:
        LZBENCH_DIR: lzbench
        SILESIA_DIR: silesia
        SILESIA_TAR: silesia.tar

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Clone LZbench
        run: |
          git clone --depth 1 https://github.com/inikep/lzbench "${LZBENCH_DIR}"

      - name: Copy Lib ZXC
        run: |
          mkdir -p ${LZBENCH_DIR}/lz/zxc/include/
          mkdir -p ${LZBENCH_DIR}/lz/zxc/src/lib/

          cp -r include ${LZBENCH_DIR}/lz/zxc/
          cp -r src/lib ${LZBENCH_DIR}/lz/zxc/src/

      - name: Build Lzbench
        working-directory: ${{ env.LZBENCH_DIR }}
        run: |
          make -j MOREFLAGS="-march=native"

      - name: Cache Silesia Corpus
        id: cache-silesia
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.SILESIA_DIR }}
            ${{ env.SILESIA_TAR }}
          key: silesia-corpus-${{ runner.os }}-v3

      - name: Download Silesia Corpus (${{ runner.os }})
        if: steps.cache-silesia.outputs.cache-hit != 'true'
        run: |
          wget --no-check-certificate -q https://sun.aei.polsl.pl/~sdeor/corpus/silesia.zip -O silesia.zip
          mkdir -p "${SILESIA_DIR}"
          unzip -q silesia.zip -d "${SILESIA_DIR}"

      - name: Create Silesia tar (deterministic, cross-platform)
        run: |
          if [ ! -f "${SILESIA_TAR}" ]; then
            python3 -c "
          import tarfile, os
          files = ['dickens','mozilla','mr','nci','ooffice','osdb','reymont','samba','sao','webster','x-ray','xml']
          with tarfile.open('${SILESIA_TAR}', 'w', format=tarfile.USTAR_FORMAT) as tar:
              for f in files:
                  path = os.path.join('${SILESIA_DIR}', f)
                  info = tar.gettarinfo(path, arcname=f)
                  info.uid = info.gid = 0
                  info.uname = info.gname = ''
                  info.mtime = 0
                  info.mode = 0o644
                  with open(path, 'rb') as fh:
                      tar.addfile(info, fh)
          "
          fi

      - name: Run Lzbench on Silesia Corpus
        working-directory: ${{ env.LZBENCH_DIR }}
        run: |
          ./lzbench \
            -e"memcpy/zxc/lz4/lz4fast,17/lz4hc,9/lzav,1/snappy/zstd_fast,-1/zstd,1/zlib,1" \
            -j -t8,8 -o1 "../${SILESIA_TAR}" \
            > ../benchmark.md

          echo "Benchmark finished. First lines:"
          head -n 40 ../benchmark.md

      - name: Add Benchmark to Job Summary
        run: |
          echo "### Benchmark Result (${{ matrix.os }})" >> $GITHUB_STEP_SUMMARY
          cat benchmark.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Benchmark Result as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-${{ matrix.os }}-${{ github.sha }}
          path: benchmark.md
          if-no-files-found: error
          retention-days: 10