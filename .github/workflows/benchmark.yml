name: Benchmark

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - '.github/workflows/benchmark.yml'
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  lzbench-benchmark:
    name: Run Benchmark
    if: github.event.pull_request.draft == false
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-26-xlarge]

    env:
        LZBENCH_DIR: lzbench
        SILESIA_TAR: silesia.tar

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Select Latest Xcode
        if: runner.os == 'macOS'
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.app
          clang --version

      - name: Clone LZbench
        run: |
          # git clone --depth 1 https://github.com/inikep/lzbench "${LZBENCH_DIR}"
          git clone -b zxc-level-6 https://github.com/hellobertrand/lzbench "${LZBENCH_DIR}"

      - name: Copy Lib ZXC
        run: |
          mkdir -p ${LZBENCH_DIR}/lz/zxc/include/
          mkdir -p ${LZBENCH_DIR}/lz/zxc/src/lib/

          cp -r include ${LZBENCH_DIR}/lz/zxc/
          cp -r src/lib ${LZBENCH_DIR}/lz/zxc/src/

      - name: Build Lzbench
        working-directory: ${{ env.LZBENCH_DIR }}
        run: |
          SKIP_CODECS="DONT_BUILD_BRIEFLZ=1 DONT_BUILD_BROTLI=1 DONT_BUILD_BSC=1"
          SKIP_CODECS+=" DONT_BUILD_BZIP2=1 DONT_BUILD_BZIP3=1 DONT_BUILD_CSC=1"
          SKIP_CODECS+=" DONT_BUILD_CRUSH=1 DONT_BUILD_DENSITY=1 DONT_BUILD_FASTLZ=1"
          SKIP_CODECS+=" DONT_BUILD_FASTLZMA2=1 DONT_BUILD_GIPFELI=1 DONT_BUILD_GLZA=1"
          SKIP_CODECS+=" DONT_BUILD_KANZI=1 DONT_BUILD_LIBDEFLATE=1 DONT_BUILD_LIZARD=1"
          SKIP_CODECS+=" DONT_BUILD_LZF=1 DONT_BUILD_LZFSE=1 DONT_BUILD_LZG=1"
          SKIP_CODECS+=" DONT_BUILD_LZHAM=1 DONT_BUILD_LZJB=1 DONT_BUILD_LZLIB=1"
          SKIP_CODECS+=" DONT_BUILD_LZMA=1 DONT_BUILD_LZMAT=1 DONT_BUILD_LZO=1"
          SKIP_CODECS+=" DONT_BUILD_LZRW=1 DONT_BUILD_LZSSE=1 DONT_BUILD_PPMD=1"
          SKIP_CODECS+=" DONT_BUILD_QUICKLZ=1 DONT_BUILD_SLZ=1 DONT_BUILD_TAMP=1"
          SKIP_CODECS+=" DONT_BUILD_TORNADO=1 DONT_BUILD_UCL=1 DONT_BUILD_WFLZ=1"
          SKIP_CODECS+=" DONT_BUILD_XZ=1 DONT_BUILD_YALZ77=1 DONT_BUILD_YAPPY=1"
          SKIP_CODECS+=" DONT_BUILD_ZLIB_NG=1 DONT_BUILD_ZLING=1 DONT_BUILD_ZPAQ=1"
          SKIP_CODECS+=" DONT_BUILD_MEMLZ=1"

          # Use latest available compiler per platform
          if [ "$RUNNER_OS" = "Linux" ]; then
            export CC=gcc-14 CXX=g++-14
          fi

          make -j $SKIP_CODECS CC="${CC:-cc}" MOREFLAGS="-march=native"

      - name: Cache Silesia Corpus
        id: cache-silesia
        uses: actions/cache@v5
        with:
          path: ${{ env.SILESIA_TAR }}
          key: silesia-tar-v1

      - name: Download Silesia Corpus
        if: steps.cache-silesia.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/DataCompression/corpus-collection/raw/main/Silesia-Corpus/silesia.tar.gz -O silesia.tar.gz
          gunzip silesia.tar.gz

      - name: SHA256 Checksum
        run: |
          shasum -a 256 "${SILESIA_TAR}"

      - name: Run Lzbench on Silesia Corpus
        working-directory: ${{ env.LZBENCH_DIR }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CODECS="memcpy/zxc/lz4"
          else
            CODECS="memcpy/zxc/lz4/lz4fast,17/lz4hc,9/lzav,1/snappy/zstd_fast,-1/zstd,1/zlib,1"
          fi
      
          ./lzbench -e"${CODECS}" -j -t8,8 -o1 "../${SILESIA_TAR}" > ../benchmark.md
      
          echo "Benchmark finished. First lines:"
          head -n 40 ../benchmark.md

      - name: Add Benchmark to Job Summary
        run: |
          echo "### Benchmark Result (${{ matrix.os }})" >> $GITHUB_STEP_SUMMARY
          cat benchmark.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Benchmark Result as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-${{ matrix.os }}-${{ github.sha }}
          path: benchmark.md
          if-no-files-found: error
          retention-days: 10