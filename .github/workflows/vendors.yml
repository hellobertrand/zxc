name: Update Vendors

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read

jobs:
  update-rapidhash-header:
    runs-on: ubuntu-slim

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download latest rapidhash.h
        run: |
          curl -o src/lib/vendors/rapidhash.h https://raw.githubusercontent.com/Nicoshev/rapidhash/refs/heads/master/rapidhash.h

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update rapidhash.h from upstream"
          title: "Automatic update of rapidhash.h"
          body: | 
              This PR updates `rapidhash.h` with the latest version from the official repository.
              Source : [Nicoshev/rapidhash](https://github.com/Nicoshev/rapidhash)
          branch: auto-update/rapidhash
          delete-branch: true