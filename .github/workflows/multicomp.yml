name: Compiler & Build System Compatibility

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  # ===========================================================================
  # Clang 12–20 on Ubuntu
  # ===========================================================================
  clang:
    name: "Clang ${{ matrix.version }} (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 22.04 ships Clang 13, 14, 15 - Clang 12 is in standard repos
          - { os: ubuntu-22.04, version: 12, needs_install: true,  needs_llvm_apt: false, llvm_distro: "" }
          - { os: ubuntu-22.04, version: 13, needs_llvm_apt: false, llvm_distro: "" }
          - { os: ubuntu-22.04, version: 14, needs_llvm_apt: false, llvm_distro: "" }
          - { os: ubuntu-22.04, version: 15, needs_llvm_apt: false, llvm_distro: "" }
          # Ubuntu 24.04 ships Clang 16, 17, 18 - 19/20 need LLVM APT
          - { os: ubuntu-latest, version: 16, needs_llvm_apt: false, llvm_distro: "" }
          - { os: ubuntu-latest, version: 17, needs_llvm_apt: false, llvm_distro: "" }
          - { os: ubuntu-latest, version: 18, needs_llvm_apt: false, llvm_distro: "" }
          - { os: ubuntu-latest, version: 19, needs_llvm_apt: true,  llvm_distro: noble }
          - { os: ubuntu-latest, version: 20, needs_llvm_apt: true,  llvm_distro: noble }

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Clang ${{ matrix.version }} (standard repos)
        if: matrix.needs_install && !matrix.needs_llvm_apt
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-${{ matrix.version }}

      - name: Install Clang ${{ matrix.version }} (LLVM APT)
        if: matrix.needs_llvm_apt
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/${{ matrix.llvm_distro }}/ llvm-toolchain-${{ matrix.llvm_distro }}-${{ matrix.version }} main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-${{ matrix.version }}

      - name: Configure, Build & Test (Static & Shared)
        shell: bash
        run: |
          for LIB_TYPE in "STATIC" "SHARED"; do
              echo ">>> Starting Build: Clang ${{ matrix.version }} – $LIB_TYPE"
              BUILD_DIR="build_${LIB_TYPE}"

              SHARED_FLAG="OFF"
              if [ "$LIB_TYPE" == "SHARED" ]; then SHARED_FLAG="ON"; fi

              cmake -S . -B $BUILD_DIR \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DCMAKE_C_COMPILER=clang-${{ matrix.version }} \
                  -DCMAKE_C_STANDARD=17 \
                  -DZXC_NATIVE_ARCH=OFF \
                  -DZXC_ENABLE_LTO=OFF \
                  -DBUILD_SHARED_LIBS=$SHARED_FLAG

              cmake --build $BUILD_DIR --config Release --parallel

              echo "Running Tests for $LIB_TYPE..."
              ctest --test-dir $BUILD_DIR -C Release --output-on-failure

              echo ">>> Completed Build: $LIB_TYPE"
              echo ""
          done

  # ===========================================================================
  # Apple Clang on macOS 14
  # ===========================================================================
  clang-macos:
    name: "Apple Clang (macOS 14)"
    runs-on: macos-14
    strategy:
      fail-fast: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure, Build & Test (Static & Shared)
        shell: bash
        run: |
          for LIB_TYPE in "STATIC" "SHARED"; do
              echo ">>> Starting Build: Apple Clang – $LIB_TYPE"
              BUILD_DIR="build_${LIB_TYPE}"

              SHARED_FLAG="OFF"
              if [ "$LIB_TYPE" == "SHARED" ]; then SHARED_FLAG="ON"; fi

              cmake -S . -B $BUILD_DIR \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DCMAKE_C_STANDARD=17 \
                  -DZXC_NATIVE_ARCH=OFF \
                  -DBUILD_SHARED_LIBS=$SHARED_FLAG

              cmake --build $BUILD_DIR --config Release --parallel

              echo "Running Tests for $LIB_TYPE..."
              ctest --test-dir $BUILD_DIR -C Release --output-on-failure

              echo ">>> Completed Build: $LIB_TYPE"
              echo ""
          done

  # ===========================================================================
  # GCC 9–16 on Ubuntu
  # ===========================================================================
  gcc:
    name: "GCC ${{ matrix.version }} (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 22.04 preinstalls GCC 10, 11, 12; GCC 9 lives in universe.
          - { os: ubuntu-22.04, version: 9, needs_install: true }
          - { os: ubuntu-22.04, version: 10 }
          - { os: ubuntu-22.04, version: 11 }
          - { os: ubuntu-22.04, version: 12 }
          # Ubuntu 24.04 preinstalls GCC 12, 13, 14.
          - { os: ubuntu-latest, version: 13 }
          - { os: ubuntu-latest, version: 14 }
          # GCC 15, 16 from the toolchain test PPA.
          - { os: ubuntu-latest, version: 15, needs_install: true, needs_ppa: true }
          - { os: ubuntu-latest, version: 16, needs_install: true, needs_ppa: true }

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Add Toolchain Test PPA (newer GCC)
        if: matrix.needs_ppa
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test

      - name: Install GCC ${{ matrix.version }}
        if: matrix.needs_install
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-${{ matrix.version }} g++-${{ matrix.version }}

      - name: Configure, Build & Test (Static & Shared)
        shell: bash
        run: |
          for LIB_TYPE in "STATIC" "SHARED"; do
              echo ">>> Starting Build: GCC ${{ matrix.version }} – $LIB_TYPE"
              BUILD_DIR="build_${LIB_TYPE}"

              SHARED_FLAG="OFF"
              if [ "$LIB_TYPE" == "SHARED" ]; then SHARED_FLAG="ON"; fi

              cmake -S . -B $BUILD_DIR \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DCMAKE_C_COMPILER=gcc-${{ matrix.version }} \
                  -DCMAKE_CXX_COMPILER=g++-${{ matrix.version }} \
                  -DCMAKE_C_STANDARD=17 \
                  -DZXC_NATIVE_ARCH=OFF \
                  -DZXC_ENABLE_LTO=OFF \
                  -DBUILD_SHARED_LIBS=$SHARED_FLAG

              cmake --build $BUILD_DIR --config Release --parallel

              echo "Running Tests for $LIB_TYPE..."
              ctest --test-dir $BUILD_DIR -C Release --output-on-failure

              echo ">>> Completed Build: $LIB_TYPE"
              echo ""
          done

  # ===========================================================================
  # MinGW on Windows (32-bit & 64-bit)
  # ===========================================================================
  mingw:
    name: "MinGW ${{ matrix.name }}"
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "x86 32-bit"
            msystem: MINGW32
            pkg_prefix: mingw-w64-i686
          - name: "x86_64 64-bit"
            msystem: MINGW64
            pkg_prefix: mingw-w64-x86_64

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Setup MSYS2
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            ${{ matrix.pkg_prefix }}-gcc
            ${{ matrix.pkg_prefix }}-cmake
            make

      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure, Build & Test (Static & Shared)
        run: |
          for LIB_TYPE in "STATIC" "SHARED"; do
              echo ">>> Starting Build: MinGW ${{ matrix.name }} – $LIB_TYPE"
              BUILD_DIR="build_${LIB_TYPE}"

              SHARED_FLAG="OFF"
              if [ "$LIB_TYPE" == "SHARED" ]; then SHARED_FLAG="ON"; fi

              cmake -S . -B $BUILD_DIR \
                  -G "MSYS Makefiles" \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DCMAKE_C_STANDARD=17 \
                  -DZXC_NATIVE_ARCH=OFF \
                  -DBUILD_SHARED_LIBS=$SHARED_FLAG

              cmake --build $BUILD_DIR --config Release --parallel

              echo "Running Tests for $LIB_TYPE..."
              ctest --test-dir $BUILD_DIR -C Release --output-on-failure

              echo ">>> Completed Build: $LIB_TYPE"
              echo ""
          done

  # ===========================================================================
  # GCC ARM cross-compilation on Ubuntu (32-bit & 64-bit)
  # ===========================================================================
  gcc-arm:
    name: "GCC ARM ${{ matrix.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "32-bit (armhf)"
            cross_pkg: gcc-arm-linux-gnueabihf
            cross_prefix: arm-linux-gnueabihf
            cmake_processor: arm
            qemu_binary: qemu-arm
          - name: "64-bit (aarch64)"
            cross_pkg: gcc-aarch64-linux-gnu
            cross_prefix: aarch64-linux-gnu
            cmake_processor: aarch64
            qemu_binary: qemu-aarch64

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cross-compiler & QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cross_pkg }} qemu-user

      - name: Configure, Build & Test (Static & Shared)
        shell: bash
        run: |
          CROSS_C=${{ matrix.cross_prefix }}-gcc
          CROSS_CXX=${{ matrix.cross_prefix }}-g++
          CROSS_STRIP=/usr/bin/${{ matrix.cross_prefix }}-strip
          SYSROOT=/usr/${{ matrix.cross_prefix }}

          for LIB_TYPE in "STATIC" "SHARED"; do
              echo ">>> Starting Build: GCC ARM ${{ matrix.name }} – $LIB_TYPE"
              BUILD_DIR="build_${LIB_TYPE}"

              SHARED_FLAG="OFF"
              if [ "$LIB_TYPE" == "SHARED" ]; then SHARED_FLAG="ON"; fi

              cmake -S . -B $BUILD_DIR \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DCMAKE_C_COMPILER=$CROSS_C \
                  -DCMAKE_CXX_COMPILER=$CROSS_CXX \
                  -DCMAKE_STRIP=$CROSS_STRIP \
                  -DCMAKE_SYSTEM_NAME=Linux \
                  -DCMAKE_SYSTEM_PROCESSOR=${{ matrix.cmake_processor }} \
                  -DCMAKE_C_STANDARD=17 \
                  -DZXC_NATIVE_ARCH=OFF \
                  -DBUILD_SHARED_LIBS=$SHARED_FLAG

              cmake --build $BUILD_DIR --config Release --parallel

              echo "Running Tests for $LIB_TYPE via QEMU..."
              ${{ matrix.qemu_binary }} -L $SYSROOT ./$BUILD_DIR/zxc_test

              echo ">>> Completed Build: $LIB_TYPE"
              echo ""
          done

  # ===========================================================================
  # Meson (alternative build system)
  # ===========================================================================
  meson:
    name: "Meson ${{ matrix.name }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
          - name: Linux ARM64
            os: ubuntu-24.04-arm

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Meson and Ninja
        run: pip3 install --require-hashes -r .github/requirements/meson.txt

      - name: Setup (static)
        run: meson setup build-static -Ddefault_library=static

      - name: Build (static)
        run: meson compile -C build-static

      - name: Test (static)
        run: meson test -C build-static --print-errorlogs

      - name: Setup (shared)
        run: meson setup build-shared -Ddefault_library=shared

      - name: Build (shared)
        run: meson compile -C build-shared

      - name: Test (shared)
        run: meson test -C build-shared --print-errorlogs
