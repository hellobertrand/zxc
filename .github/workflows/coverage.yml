name: Code Coverage

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'tests/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'tests/**'

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov

    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DZXC_ENABLE_COVERAGE=ON -DZXC_NATIVE_ARCH=OFF

    - name: Build
      run: cmake --build build --parallel

    - name: Run Unit Tests
      working-directory: build
      run: ctest --output-on-failure

    - name: Run CLI Tests
      run: |
        chmod +x tests/test_cli.sh
        ./tests/test_cli.sh build/zxc

    - name: Generate Coverage Report
      run: |
        # Capture coverage data
        lcov --capture --directory . --output-file coverage.info --ignore-errors gcov,negative
        
        # Filter out system headers, external libraries, CLI frontend, and test files
        lcov --remove coverage.info '/usr/*' '*/tests/*' '*/cli/*' '*/src/lib/vendors/rapidhash.h' --output-file coverage.info --ignore-errors unused
        
        # Output file list
        lcov --list coverage.info

    - name: Generate HTML Report
      run: genhtml coverage.info --output-directory coverage-report

    - name: Publish Coverage Summary
      run: |
        echo "## Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        lcov --summary coverage.info 2>&1 | tail -n +2 >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

    - name: Upload Coverage Artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-report
        path: coverage-report
        retention-days: 10

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.info
        fail_ci_if_error: true
