name: Build & Release

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  release:
    types: [ published ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  build-and-test:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            artifact_name: zxc
            platform: linux-x86_64
            cmake_flags: "-DZXC_NATIVE_ARCH=OFF"
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            artifact_name: zxc
            platform: linux-arm64
            cmake_flags: "-DZXC_NATIVE_ARCH=OFF"
          - name: macOS ARM64
            os: macos-26
            artifact_name: zxc
            platform: macos-arm64
            cmake_flags: "-DZXC_NATIVE_ARCH=OFF"
          - name: Windows x86_64
            os: windows-latest
            artifact_name: zxc.exe
            platform: windows-x86_64
            cmake_flags: "-A x64 -DZXC_NATIVE_ARCH=OFF"
          - name: Windows ARM64
            os: windows-11-arm
            artifact_name: zxc.exe
            platform: windows-arm64
            cmake_flags: "-A ARM64 -DZXC_NATIVE_ARCH=OFF"


    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Latest Compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "CC=gcc-14" >> $GITHUB_ENV
          echo "CXX=g++-14" >> $GITHUB_ENV
          gcc-14 --version

      - name: Select Latest Xcode (macOS)
        if: runner.os == 'macOS'
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.app
          clang --version

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }}

      - name: Build 
        run: cmake --build build --config Release --parallel

      - name: Test (native)
        working-directory: build
        run: ctest -C Release --output-on-failure

      - name: Test CLI
        shell: bash
        run: |
          BUILD_DIR="build"
          # Find binary (handle both Ninja and Visual Studio generators)
          if [ -f "$BUILD_DIR/Release/${{ matrix.artifact_name }}" ]; then
            ZXC_BIN="$BUILD_DIR/Release/${{ matrix.artifact_name }}"
          elif [ -f "$BUILD_DIR/${{ matrix.artifact_name }}" ]; then
            ZXC_BIN="$BUILD_DIR/${{ matrix.artifact_name }}"
          else
            echo "Binary not found for CLI test!"
            find "$BUILD_DIR" -name "${{ matrix.artifact_name }}"
            exit 1
          fi
          
          echo "Testing with binary: $ZXC_BIN"
          chmod +x tests/test_cli.sh
          ./tests/test_cli.sh "$ZXC_BIN"

      - name: Package Release (Archive)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE_BASE="zxc-${VERSION}-${{ matrix.platform }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ARCHIVE="${ARCHIVE_BASE}.zip"
          else
            ARCHIVE="${ARCHIVE_BASE}.tar.gz"
          fi
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

          # Install to staging directory using CMake (Standard way for all OS)
          cmake --install build --prefix "release_staging/${ARCHIVE_BASE}" --config Release

          # Strip binary on Unix-like systems only (installed to bin/)
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            strip "release_staging/${ARCHIVE_BASE}/bin/${{ matrix.artifact_name }}"
          fi

          cp LICENSE "release_staging/${ARCHIVE_BASE}/LICENSE.txt"
          cp docs/man/zxc.1.md "release_staging/${ARCHIVE_BASE}/MANUAL.md"
          cat > "release_staging/${ARCHIVE_BASE}/README.md" <<EOF
          # ZXC ${VERSION}

          Asymmetric Lossless Compression Built for Ultra-Fast Decode

          **Contents:**
          - \`bin/\` — \`zxc\` CLI compressor/decompressor
          - \`lib/\` — shared and static libraries
          - \`include/\` — C headers

          **CLI usage:** See [MANUAL.md](MANUAL.md) for the full reference (synopsis, options, examples).

          **Release history:** https://github.com/${GITHUB_REPOSITORY}/releases

          **Documentation, benchmarks & source:** https://github.com/${GITHUB_REPOSITORY}

          **Verify build provenance (SLSA):** every archive is signed via [GitHub Artifact Attestations](https://docs.github.com/en/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds). Verify with:
          \`\`\`
          gh attestation verify <archive> --repo ${GITHUB_REPOSITORY}
          \`\`\`

          License: BSD-3-Clause (see LICENSE.txt)
          EOF

          # Create archive with versioned top-level directory
          cd release_staging
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a "../${ARCHIVE}" "${ARCHIVE_BASE}"
          else
            tar -czvf "../${ARCHIVE}" "${ARCHIVE_BASE}"
          fi

      - name: Attest build provenance (SLSA)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ env.ARCHIVE }}

      - name: Upload Artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zxc-${{ matrix.platform }}
          path: ${{ env.ARCHIVE }}

  sbom:
    name: Generate SBOM
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-slim
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Sanitize ref name
        id: ref
        run: echo "slug=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - name: Render SBOM from template
        shell: bash
        env:
          SBOM_FILE: zxc-${{ steps.ref.outputs.slug }}-sbom.spdx.json
          VERSION: ${{ steps.ref.outputs.slug }}
          COMMIT: ${{ github.sha }}
        run: |
          CREATED="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          sed \
            -e "s|@VERSION@|${VERSION}|g" \
            -e "s|@COMMIT@|${COMMIT}|g" \
            -e "s|@CREATED@|${CREATED}|g" \
            sbom.spdx.json.in > "$SBOM_FILE"
          # Validate JSON syntax
          jq empty "$SBOM_FILE"

      - name: Attest SBOM provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: zxc-${{ steps.ref.outputs.slug }}-sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: zxc-${{ steps.ref.outputs.slug }}-sbom.spdx.json

  release:
    name: Create GitHub Release
    needs: [build-and-test, sbom]
    runs-on: ubuntu-slim
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.spdx.json' \) -exec mv {} release/ \;
          ls -la release

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            release/*.tar.gz
            release/*.zip
            release/*.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  hashes:
    name: Compute release artifact hashes
    needs: [build-and-test, sbom]
    runs-on: ubuntu-slim
    if: startsWith(github.ref, 'refs/tags/')
    outputs:
      digests: ${{ steps.hash.outputs.digests }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate subject digests (base64 sha256sum)
        id: hash
        working-directory: artifacts
        run: |
          ls -la
          echo "digests=$(sha256sum *.tar.gz *.zip *.spdx.json | base64 -w0)" >> "$GITHUB_OUTPUT"

  provenance:
    name: SLSA provenance
    needs: [hashes, release]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      actions: read     # read the workflow run to assemble provenance
      id-token: write   # keyless signing via Sigstore / OIDC
      contents: write   # attach multiple.intoto.jsonl to the release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.hashes.outputs.digests }}
      upload-assets: true
      upload-tag-name: ${{ github.ref_name }}